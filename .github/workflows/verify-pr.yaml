---
name: Verify Pull Request

on:
  pull_request:
    branches:
      - main
      - release/v0

permissions:
  contents: read

# Cancel any in-flight jobs for the same pull request so there is only one job active at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-attest-windows:
    # Validates the cross-platform attestation path on Windows. Uses the
    # same `./attest` action the customer would use on a GHES self-hosted
    # Windows runner. Keyed signing path (offline, data-residency safe).
    #
    # As of #118, the Windows install path resolves the latest tag from
    # cycodelabs/cimon-releases and downloads cimon_windows_x86_64.zip
    # directly from the GitHub release — no S3 install.ps1 dependency,
    # so this job is end-to-end runnable.
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2

      - name: Build sample Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Set-Content -Path dist/sample.exe -Value "fake-windows-binary-$(Get-Date -Format o)"

      - name: Generate ephemeral signing key
        shell: pwsh
        run: |
          & "C:\Program Files\Git\usr\bin\openssl.exe" genrsa -out private-key.pem 3072

      - name: Cimon Attest (Windows, keyed)
        uses: ./attest
        with:
          client-id: ${{ secrets.CIMON_CLIENT_ID }}
          secret:    ${{ secrets.CIMON_SECRET }}
          subjects:  dist\sample.exe
          sign-key:  private-key.pem
          report-job-summary: true
          report-artifact:    true
          fail-on-error:      true

      - name: Show provenance
        shell: pwsh
        run: Get-Content provenance.intoto.jsonl

  verify:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2

      - name: Run Cimon
        uses: ./
        with:
          client-id: ${{ secrets.CIMON_CLIENT_ID }}
          secret: ${{ secrets.CIMON_SECRET }}
          prevent: true
          allowed-hosts: >
            cycode.com
            registry.npmjs.org
          report-process-tree: true
          fail-on-error: true

      - name: Test
        run: |
          curl -I https://api.github.com
          curl -I https://cycode.com
          wget --quiet --timeout 1 https://registry.npmjs.org || true

  verify-in-container:
    runs-on: ubuntu-22.04
    container:
      image: alpine:3.18
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2

      - name: Install dependencies
        run: |
          apk update
          apk add curl wget

      - name: Run Cimon
        uses: ./
        with:
          client-id: ${{ secrets.CIMON_CLIENT_ID }}
          secret: ${{ secrets.CIMON_SECRET }}
          prevent: true
          allowed-hosts: >
            cycode.com
            registry.npmjs.org
          report-process-tree: true
          fail-on-error: true

      - name: Test
        run: |
          curl -I https://api.github.com
          curl -I https://cycode.com
          wget --quiet --timeout 1 https://registry.npmjs.org || true

  verify-provenance:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2

      - name: Create Private Key
        run: |
          openssl genrsa -out private-key.pem 3072

      - name: Run Cimon
        uses: ./attest
        with:
          client-id: ${{ secrets.CIMON_CLIENT_ID }}
          secret: ${{ secrets.CIMON_SECRET }}
          subjects: NDgyY2U4YzhmN2U4NjdkYTNhM2MwNWE5YWVlNjM3NzAzZTE3NDcwZWQxY2Y4ODJhOWU1YjQwNWU4ZjgyNjE5ZCAgYXJ0aWZhY3QxCjg5Y2ZjNjk1NGU4OGIyZjkyYTdjMjg3OWQ5ZWIwODVjNDJmM2M3MDY1ZDAxMmE1MDY2ZjQ1MGRiZTU5YjJjMDAgIGFydGlmYWN0Mgo=
          sign-key: private-key.pem
          report-job-summary: true
          report-artifact: true
          fail-on-error: true

  verify-provenance-image-ref:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2

      - name: Create Private Key
        run: |
          openssl genrsa -out private-key.pem 3072

      - name: Run Cimon
        uses: ./attest
        with:
          client-id: ${{ secrets.CIMON_CLIENT_ID }}
          secret: ${{ secrets.CIMON_SECRET }}
          subjects: 'cycodelabs/cimon@sha256:ad4ab84178621f359a5ec1ba9eff8ba46626d8d1999416646b6aaa96bfcbf802'
          sign-key: private-key.pem
          report-job-summary: true
          report-artifact: true
          fail-on-error: true

  verify-agent-and-attest:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2

      - name: Run Cimon Agent
        uses: ./
        with:
          client-id: ${{ secrets.CIMON_CLIENT_ID }}
          secret: ${{ secrets.CIMON_SECRET }}
          report-process-tree: true
          fail-on-error: true

      - name: Create Artifact
        run: |
          echo artifact > artifact.txt

      - name: Run Cimon Attest
        uses: ./attest
        with:
          client-id: ${{ secrets.CIMON_CLIENT_ID }}
          secret: ${{ secrets.CIMON_SECRET }}
          subjects: artifact.txt
          report-job-summary: true
          fail-on-error: true

      - name: Test
        run: |
          curl -I https://api.github.com
          curl -I https://cycode.com
          wget --quiet --timeout 1 https://registry.npmjs.org || true
